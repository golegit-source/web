<?xml version="1.0" encoding="utf-8"?>
<!-- GoLegit — Avatar WhatsApp Business (512x512, viewBox 100x100)
     Diseñado para recorte circular: todos los vértices y la cola
     están dentro del círculo inscrito (r=50, centro 50,50).
     NO usar este archivo para favicon ni logo — es específico para WA. -->
<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo verde — WhatsApp recorta en círculo -->
  <rect width="100" height="100" fill="#16a34a"/>
  <!-- Burbuja blanca con cola abajo-izquierda
       Todos los puntos dentro del círculo r=50 centrado en 50,50:
       esquinas (84,16) y (16,16) → dist 48.1 ✓
       cola tip (20,84) → dist 45.3 ✓ -->
  <path
    fill="white"
    d="M24,16 H76 Q84,16 84,24 V60 Q84,68 76,68 H36 L20,84 V68 Q16,68 16,60 V24 Q16,16 24,16 Z"
  />
  <!-- Checkmark verde, centrado en la burbuja -->
  <polyline
    fill="none"
    stroke="#16a34a"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    points="32,45 43,56 67,34"
  />
</svg>
