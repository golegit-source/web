<?xml version="1.0" encoding="utf-8"?>
<!-- GoLegit — Avatar WhatsApp Business
     Fondo blanco + ícono outline verde con padding generoso
     para que el recorte circular no toque el ícono. -->
<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="white"/>
  <!-- Ícono centrado y escalado con padding ~20% por lado
       path original viewBox 0 0 28 35 → centrado en 50,50 con altura ~50 -->
  <g transform="translate(50,50) scale(1.55) translate(-14,-17.5)">
    <path
      fill="none"
      stroke="#16a34a"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M4.5,4 H22.5 Q25,4 25,6.5 V22 Q25,25 22.5,25 H10.5 L6,33 V25 Q3,25 3,22 V6.5 Q3,4 4.5,4 Z"
    />
    <polyline
      fill="none"
      stroke="#16a34a"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
      points="8,15 11.5,18.5 19.5,10"
    />
  </g>
</svg>
